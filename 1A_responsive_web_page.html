<!DOCTYPE html>
<html>
<head>
    <title>College Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
        }
        .sidebar {
            height: 100vh;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">College Admin Panel</span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 bg-dark text-white sidebar p-3">
            <h5>Menu</h5>
            <ul class="nav flex-column">
                <li class="nav-item">Dashboard</li>
                <li class="nav-item">Students</li>
                <li class="nav-item">Courses</li>
                <li class="nav-item">Attendance</li>
                <li class="nav-item">Results</li>
            </ul>
        </div>

        <div class="col-md-10 p-4">

            <h3>Dashboard</h3>

            <div class="row">

                <div class="col-md-3">
                    <div class="card bg-primary text-white p-3">
                        <h6>Total Students</h6>
                        <h3>500</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-success text-white p-3">
                        <h6>Total Courses</h6>
                        <h3>25</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-warning text-white p-3">
                        <h6>Attendance %</h6>
                        <h3>85%</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-danger text-white p-3">
                        <h6>Results Published</h6>
                        <h3>Yes</h3>
                    </div>
                </div>

            </div>

            <br>

            <h4>Student List</h4>

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Branch</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>101</td>
                        <td>Rahul</td>
                        <td>IT</td>
                        <td>Active</td>
                    </tr>
                    <tr>
                        <td>102</td>
                        <td>Priya</td>
                        <td>CS</td>
                        <td>Active</td>
                    </tr>
                    <tr>
                        <td>103</td>
                        <td>Amit</td>
                        <td>ENTC</td>
                        <td>Inactive</td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>
</div>

</body>
</html>
